<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="hbg" cx="50%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#05060a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#05060a"/>
  <rect width="1080" height="1080" fill="url(#hbg)"/>

  <!-- Eyebrow pill -->
  <g transform="translate(540, 110)">
    <rect x="-235" y="-28" width="470" height="56" rx="28" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" fill="#22c55e" font-size="22" font-weight="800" letter-spacing="5">AUTOMATED &middot; EVERY WEEK</text>
  </g>

  <!-- Hero headline (two lines) -->
  <text x="540" y="218" text-anchor="middle" fill="#ffffff" font-size="108" font-weight="900" letter-spacing="-3">Power rankings,</text>
  <text x="540" y="318" text-anchor="middle" fill="#ffffff" font-size="108" font-weight="900" letter-spacing="-3">built for your league.</text>

  <!-- Product card -->
  <g transform="translate(60, 370)">
    <rect x="0" y="0" width="960" height="540" rx="18" fill="#0a0c14" stroke="#1e2130" stroke-width="2"/>
    <!-- top accent bar -->
    <rect x="0" y="0" width="960" height="4" fill="#22c55e"/>

    <!-- Header strip -->
    <rect x="0" y="4" width="960" height="58" fill="#080a10"/>
    <text x="28" y="42" fill="#22c55e" font-size="22" font-weight="900" letter-spacing="3">⚡ POWER RANKINGS — WEEK 12</text>
    <text x="932" y="42" text-anchor="end" fill="#4b5563" font-size="13" font-weight="700" letter-spacing="2">REAL SCORE</text>
    <line x1="0" y1="62" x2="960" y2="62" stroke="#1e2130" stroke-width="1"/>

    <!-- Column headers -->
    <g font-size="13" font-weight="700" fill="#4b5563" letter-spacing="2">
      <text x="40" y="92">#</text>
      <text x="92" y="92">+/-</text>
      <text x="155" y="92">TEAM</text>
      <text x="660" y="92" text-anchor="end">SCORE</text>
      <text x="790" y="92" text-anchor="end">W-L</text>
      <text x="910" y="92" text-anchor="end">WIN%</text>
    </g>
    <line x1="0" y1="106" x2="960" y2="106" stroke="#1e2130" stroke-width="1"/>

    <!-- Row 1: Wild Rotos (the proof — 7-4 record but #1 power) -->
    <g transform="translate(0, 130)">
      <text x="40" y="22" fill="#eab308" font-size="32" font-weight="900">1</text>
      <text x="92" y="22" fill="#22c55e" font-size="15" font-weight="800">▲3</text>
      <text x="155" y="24" fill="#ffffff" font-size="24" font-weight="800">Wild Rotos</text>
      <rect x="155" y="38" width="490" height="7" rx="3.5" fill="#1e2130"/>
      <rect x="155" y="38" width="470" height="7" rx="3.5" fill="#22c55e"/>
      <text x="660" y="26" text-anchor="end" fill="#22c55e" font-size="24" font-weight="900">91.2</text>
      <text x="790" y="26" text-anchor="end" fill="#9ca3af" font-size="20" font-weight="600">7-4</text>
      <text x="910" y="26" text-anchor="end" fill="#9ca3af" font-size="20" font-weight="700">63.6%</text>
    </g>
    <line x1="20" y1="190" x2="940" y2="190" stroke="#0f1017" stroke-width="1"/>

    <!-- Row 2: Crazy Eights — best record but #2 -->
    <g transform="translate(0, 210)">
      <text x="40" y="22" fill="#eab308" font-size="32" font-weight="900">2</text>
      <text x="92" y="22" fill="#ef4444" font-size="15" font-weight="800">▼1</text>
      <text x="155" y="24" fill="#ffffff" font-size="24" font-weight="800">Crazy Eights</text>
      <rect x="155" y="38" width="490" height="7" rx="3.5" fill="#1e2130"/>
      <rect x="155" y="38" width="425" height="7" rx="3.5" fill="#22c55e"/>
      <text x="660" y="26" text-anchor="end" fill="#22c55e" font-size="24" font-weight="900">82.5</text>
      <text x="790" y="26" text-anchor="end" fill="#9ca3af" font-size="20" font-weight="600">9-2</text>
      <text x="910" y="26" text-anchor="end" fill="#22c55e" font-size="20" font-weight="700">81.8%</text>
    </g>
    <line x1="20" y1="270" x2="940" y2="270" stroke="#0f1017" stroke-width="1"/>

    <!-- Row 3: Hot Corner — 8-3 but #3 -->
    <g transform="translate(0, 290)">
      <text x="40" y="22" fill="#9ca3af" font-size="32" font-weight="900">3</text>
      <text x="92" y="22" fill="#ef4444" font-size="15" font-weight="800">▼1</text>
      <text x="155" y="24" fill="#ffffff" font-size="24" font-weight="800">The Hot Corner</text>
      <rect x="155" y="38" width="490" height="7" rx="3.5" fill="#1e2130"/>
      <rect x="155" y="38" width="408" height="7" rx="3.5" fill="#eab308"/>
      <text x="660" y="26" text-anchor="end" fill="#eab308" font-size="24" font-weight="900">79.4</text>
      <text x="790" y="26" text-anchor="end" fill="#9ca3af" font-size="20" font-weight="600">8-3</text>
      <text x="910" y="26" text-anchor="end" fill="#22c55e" font-size="20" font-weight="700">72.7%</text>
    </g>
    <line x1="20" y1="350" x2="940" y2="350" stroke="#0f1017" stroke-width="1"/>

    <!-- Row 4: Juggernauts -->
    <g transform="translate(0, 370)">
      <text x="40" y="22" fill="#9ca3af" font-size="32" font-weight="900">4</text>
      <text x="92" y="22" fill="#6b7280" font-size="15" font-weight="800">—</text>
      <text x="155" y="24" fill="#ffffff" font-size="24" font-weight="800">Juggernauts</text>
      <rect x="155" y="38" width="490" height="7" rx="3.5" fill="#1e2130"/>
      <rect x="155" y="38" width="310" height="7" rx="3.5" fill="#eab308"/>
      <text x="660" y="26" text-anchor="end" fill="#eab308" font-size="24" font-weight="900">60.4</text>
      <text x="790" y="26" text-anchor="end" fill="#9ca3af" font-size="20" font-weight="600">6-5</text>
      <text x="910" y="26" text-anchor="end" fill="#9ca3af" font-size="20" font-weight="700">54.5%</text>
    </g>
    <line x1="20" y1="430" x2="940" y2="430" stroke="#0f1017" stroke-width="1"/>

    <!-- Row 5: Pink Panther -->
    <g transform="translate(0, 450)">
      <text x="40" y="22" fill="#9ca3af" font-size="32" font-weight="900">5</text>
      <text x="92" y="22" fill="#6b7280" font-size="15" font-weight="800">—</text>
      <text x="155" y="24" fill="#ffffff" font-size="24" font-weight="800">Pink Panther</text>
      <rect x="155" y="38" width="490" height="7" rx="3.5" fill="#1e2130"/>
      <rect x="155" y="38" width="245" height="7" rx="3.5" fill="#f97316"/>
      <text x="660" y="26" text-anchor="end" fill="#f97316" font-size="24" font-weight="900">46.7</text>
      <text x="790" y="26" text-anchor="end" fill="#9ca3af" font-size="20" font-weight="600">4-7</text>
      <text x="910" y="26" text-anchor="end" fill="#ef4444" font-size="20" font-weight="700">36.4%</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(540, 960)">
    <text x="0" y="0" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="900" letter-spacing="2">ULTIMATE FANTASY DASHBOARD</text>
    <text x="0" y="38" text-anchor="middle" fill="#86efac" font-size="20" font-weight="700">ESPN &middot; Yahoo &middot; Sleeper &middot; All Four Sports</text>
    <text x="0" y="74" text-anchor="middle" fill="#6b7280" font-size="17" font-weight="500">7-day free trial &middot; no card &middot; @ufdashboard</text>
  </g>
</svg>
