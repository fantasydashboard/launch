<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#0a0c14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#0a0c14"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- Inner border frame -->
  <rect x="40" y="40" width="1000" height="1270" fill="none" stroke="#1e2130" stroke-width="2" rx="20"/>

  <!-- Top handle -->
  <text x="540" y="140" text-anchor="middle" fill="#4b5563" font-size="28" font-weight="700" letter-spacing="6">@UFDASHBOARD</text>

  <!-- Eyebrow stamp -->
  <g transform="translate(540, 350)">
    <rect x="-170" y="-58" width="340" height="100" fill="none" stroke="#22c55e" stroke-width="4" rx="12"/>
    <text x="0" y="16" text-anchor="middle" fill="#22c55e" font-size="64" font-weight="900" letter-spacing="14">RANKED</text>
  </g>

  <!-- Main headline -->
  <text x="540" y="540" text-anchor="middle" fill="#ffffff" font-size="92" font-weight="900" letter-spacing="-2">All 8 new</text>
  <text x="540" y="660" text-anchor="middle" fill="#ffffff" font-size="92" font-weight="900" letter-spacing="-2">MLB City Connects</text>

  <!-- Sub -->
  <text x="540" y="780" text-anchor="middle" fill="#9ca3af" font-size="50" font-weight="600">Worst to best.</text>

  <!-- Tagline -->
  <text x="540" y="858" text-anchor="middle" fill="#86efac" font-size="40" font-weight="700" font-style="italic">Not gonna be polite about it.</text>

  <!-- Divider -->
  <line x1="450" y1="950" x2="630" y2="950" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>

  <!-- Swipe indicator -->
  <text x="540" y="1200" text-anchor="middle" fill="#ffffff" font-size="50" font-weight="800" letter-spacing="6">SWIPE  →</text>

  <!-- Page indicator -->
  <text x="80" y="1280" fill="#374151" font-size="24" font-weight="700">1 / 10</text>
</svg>
