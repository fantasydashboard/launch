    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Does Ultimate Fantasy Dashboard work with Sleeper, ESPN, and Yahoo leagues?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Ultimate Fantasy Dashboard supports all three major fantasy platforms — Sleeper, ESPN, and Yahoo Fantasy — across all four major sports: football, basketball, baseball, and hockey. Just paste your league link or connect your account. No setup required on your league end."
          }
        },
        {
          "@type": "Question",
          "name": "What sports does Ultimate Fantasy Dashboard support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ultimate Fantasy Dashboard supports fantasy football (NFL), fantasy basketball (NBA), fantasy baseball (MLB), and fantasy hockey (NHL) across Sleeper, ESPN, and Yahoo leagues. It is the only fantasy dashboard that covers all four sports on all three major platforms."
          }
        },
        {
          "@type": "Question",
          "name": "How does the fantasy power rankings tool work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Power rankings are calculated automatically each week using a combination of points scored, win-loss record, all-play record, and strength of schedule. Rankings update after each week locks and can be shared as an image card directly to your league group chat."
          }
        },
        {
          "@type": "Question",
          "name": "Does it have fantasy trade analysis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The trade analyzer evaluates trades using dynasty values and historical performance data, giving each side of a trade a grade and breakdown so you know whether you are winning or losing the deal."
          }
        },
        {
          "@type": "Question",
          "name": "Can I see my full fantasy league history?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The league history section pulls multiple seasons of data including standings, championships, head-to-head records, season finishes, and legacy scores — giving you a complete record of your league history in one place."
          }
        },
        {
          "@type": "Question",
          "name": "Does it review and grade fantasy drafts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The draft analysis tool grades every pick using Points Above Replacement calculations, showing which managers got the best value and which reaches hurt them most."
          }
        },
        {
          "@type": "Question",
          "name": "Do all my league mates need to sign up?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Only the person connecting the league needs an account. You can share cards and recaps with your whole league without them needing to log in."
          }
        }
      ]
    }
    </script>
